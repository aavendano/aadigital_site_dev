            <line x1="170" y1="0" x2="202" y2="0" stroke="url(#greenGrayStrokeHorizontal)" stroke-width="6" />

            <rect x="205" y="-40" width="80" height="80" fill="none" stroke="url(#greenGrayStrokeHorizontal)"
                  stroke-width="10" stroke-dasharray="50 2" />

            <line x1="289" y1="0" x2="321" y2="0" stroke="url(#greenGrayStrokeHorizontal)" stroke-dasharray="15 2"
